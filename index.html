<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Parcours interactif</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

<div id="map"></div>

<!-- OVERLAY QUESTION -->
<div id="quizBox" class="hidden">
  <div class="quizContent">

    <div id="quizText" class="quizText"></div>

    <div id="quizQuestion"></div>

    <input type="text" id="quizInput" placeholder="Ta réponse..." />
    <button id="quizBtn">Valider</button>

  </div>
</div>

<!-- WIN SCREEN -->
<div id="winScreen">
  <div class="winContent">
    <img src="medal.png" id="medal">
    <h1>🎉 Victoire !</h1>
    <p>Parcours réussi 🔓</p>
    <button onclick="location.reload()">Rejouer</button>
  </div>
</div>

<canvas id="confetti"></canvas>
<audio id="winSound" src="win.mp3"></audio>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
