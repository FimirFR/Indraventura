<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Parcours interactif</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

  <div id="map"></div>

  <!-- OVERLAY QUESTION -->
  <div id="quizBox" class="hidden">
    <div class="quizContent">

      <!-- HEADER -->
      <div class="quizHeader">
        <span id="quizTitle">Point</span>
        <button id="closeQuiz">✕</button>
      </div>

      <!-- BODY -->
      <div class="quizBody">

        <!-- 💬 DIALOGUES -->
        <div id="quizDialogues" class="quizDialogues"></div>

        <!-- 🏆 SUCCÈS (optionnel) -->
        <div id="quizSuccess" class="quizSuccess hidden">
          <img id="successImg" src="" />
          <div>
            <p id="successText"></p>
            <a id="successLink" href="#" target="_blank">Voir plus</a>
          </div>
        </div>

        <!-- ❓ QUESTION -->
        <div class="quizQuestionBox">
          <div id="quizQuestion" class="quizQuestion"></div>
        </div>

        <!-- 💡 INDICE (optionnel) -->
        <div id="quizHint" class="quizHint hidden"></div>

      </div>

      <!-- FOOTER -->
      <div class="quizFooter">
        <input type="text" id="quizInput" placeholder="Ta réponse...">
        <button id="quizBtn">Valider</button>
      </div>

    </div>
  </div>

  <!-- WIN SCREEN -->
  <div id="winScreen">
    <div class="winContent">
      <img src="medal.png" id="medal">
      <h1>🎉 Victoire !</h1>
      <p>Parcours réussi 🔓</p>
      <button onclick="location.reload()">Rejouer</button>
    </div>
  </div>

  <canvas id="confetti"></canvas>
  <audio id="winSound" src="win.mp3"></audio>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>

</body>

</html>
